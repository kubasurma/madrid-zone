<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Logowanie - MadridZone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        MadridZone
    </div>

    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="news.html">Aktualności</a>
        <a href="players.html">Kadra</a>
        <a href="standings.html">Tabela La Liga</a>
        <a href="matches.html">Mecze</a>
        <a href="login.html">Login</a>
    </nav>

</header>

<section class="login-page">

    <div class="login-card">

        <h1>MadridZone</h1>

        <h2>Logowanie administratora</h2>

        <p>
            Wprowadź dane, aby przejść do panelu administratora.
        </p>

        <form id="login-form">

            <label>Login</label>

            <input
                type="text"
                id="username"
                placeholder="Wpisz login"
                required
            >

            <label>Hasło</label>

            <input
                type="password"
                id="password"
                placeholder="Wpisz hasło"
                required
            >

            <button type="submit">
                Zaloguj się
            </button>

        </form>

    </div>

</section>

<script src="login.js"></script>

</body>

</html>
